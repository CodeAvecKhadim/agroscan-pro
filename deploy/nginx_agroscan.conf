# =============================================================================
#  Configuration Nginx pour AgroScan Pro
#  Fichier à placer dans : /etc/nginx/sites-available/agroscan
#  Rôle : Nginx reçoit le trafic web (port 80/443) et le transmet à
#  l'application qui tourne en local sur le port 8000.
# =============================================================================
server {
    listen 80;
    listen [::]:80;

    # ⚠️ Remplacez par votre domaine après l'avoir pointé vers l'IP du serveur.
    # Tant que vous n'avez pas de domaine, laissez "_" pour répondre à l'IP.
    server_name _;

    # Taille max des fichiers envoyés (ex : photos de plantes pour le diagnostic).
    client_max_body_size 15M;

    # Toutes les requêtes sont transmises à l'application (Gunicorn/Uvicorn).
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Petite optimisation : journaux dédiés à l'application.
    access_log /var/log/nginx/agroscan_access.log;
    error_log  /var/log/nginx/agroscan_error.log;
}
