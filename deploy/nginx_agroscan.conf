# =============================================================================
#  Configuration Nginx pour AgroScan Pro
#  Fichier à placer dans : /etc/nginx/sites-available/agroscan
#
#  PRÉREQUIS : créer /etc/nginx/conf.d/agroscan_limits.conf contenant :
#    limit_req_zone $binary_remote_addr zone=agroscan_auth:10m rate=5r/m;
# =============================================================================
server {
    listen 80;
    listen [::]:80;

    server_name _;

    # Taille max des fichiers envoyés (ex : photos de plantes pour le diagnostic).
    client_max_body_size 15M;

    # Headers de sécurité HTTP.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting sur les endpoints d'authentification (login + register).
    # burst=3 : autorise une mini-rafale, nodelay : rejette immédiatement au-delà.
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=agroscan_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Toutes les autres requêtes transmises à l'application.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/agroscan_access.log;
    error_log  /var/log/nginx/agroscan_error.log;
}
