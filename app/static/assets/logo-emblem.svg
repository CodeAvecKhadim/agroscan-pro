<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D4D2B"/>
      <stop offset="100%" stop-color="#2DB870"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DCB80"/>
      <stop offset="100%" stop-color="#1A8B4F"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="200" height="200" rx="44" ry="44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" ry="44" fill="url(#bg)"/>

  <!-- Arc circle behind pin -->
  <circle cx="100" cy="88" r="60" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5"/>

  <!-- Agricultural fields (wave shapes at bottom) -->
  <g clip-path="url(#round)">
    <ellipse cx="100" cy="175" rx="90" ry="32" fill="#136B3C"/>
    <ellipse cx="60" cy="165" rx="72" ry="22" fill="#1A8B4F"/>
    <ellipse cx="140" cy="163" rx="72" ry="22" fill="#1A8B4F"/>
    <ellipse cx="100" cy="158" rx="60" ry="16" fill="#2DB870" opacity="0.6"/>
    <!-- Field lines -->
    <path d="M30 172 Q60 155 100 158 Q140 155 170 172" fill="none" stroke="#0D4D2B" stroke-width="1.5" opacity="0.5"/>
    <path d="M15 182 Q55 162 100 166 Q145 162 185 182" fill="none" stroke="#0D4D2B" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Location pin (body) -->
  <path d="M100 38 C84 38 71 51 71 67 C71 85 100 115 100 115 C100 115 129 85 129 67 C129 51 116 38 100 38 Z" fill="white"/>
  <!-- Pin hole -->
  <circle cx="100" cy="67" r="12" fill="url(#bg)"/>
  <!-- Leaf inside pin -->
  <path d="M100 62 C100 62 92 66 93 73 C94 79 100 78 100 78 C100 78 108 73 107 67 C106 62 100 62 100 62 Z" fill="white" opacity="0.9"/>

  <!-- Satellite (top left) -->
  <g transform="translate(24,22) rotate(-30, 20, 20)">
    <!-- Body -->
    <rect x="13" y="13" width="14" height="14" rx="2" fill="white"/>
    <!-- Solar panels -->
    <rect x="1" y="15" width="10" height="10" rx="1" fill="white" opacity="0.85"/>
    <rect x="27" y="15" width="10" height="10" rx="1" fill="white" opacity="0.85"/>
    <!-- Panel dividers -->
    <line x1="6" y1="15" x2="6" y2="25" stroke="rgba(13,77,43,0.4)" stroke-width="1"/>
    <line x1="32" y1="15" x2="32" y2="25" stroke="rgba(13,77,43,0.4)" stroke-width="1"/>
    <!-- Antenna -->
    <line x1="20" y1="13" x2="20" y2="6" stroke="white" stroke-width="1.5"/>
    <circle cx="20" cy="5" r="2" fill="white"/>
    <!-- Signal waves -->
    <path d="M27 28 Q32 25 30 20" fill="none" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M29 31 Q36 27 34 19" fill="none" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Drone (top right) -->
  <g transform="translate(126,18)">
    <!-- Body -->
    <rect x="16" y="14" width="18" height="12" rx="4" fill="white"/>
    <!-- Camera -->
    <circle cx="25" cy="26" r="4" fill="white"/>
    <circle cx="25" cy="26" r="2" fill="url(#bg)"/>
    <!-- Arms -->
    <line x1="16" y1="16" x2="6" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="16" x2="44" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="6" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="24" x2="44" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Rotors -->
    <ellipse cx="6" cy="7" rx="7" ry="2" fill="white" opacity="0.7"/>
    <ellipse cx="44" cy="7" rx="7" ry="2" fill="white" opacity="0.7"/>
    <ellipse cx="6" cy="31" rx="7" ry="2" fill="white" opacity="0.7"/>
    <ellipse cx="44" cy="31" rx="7" ry="2" fill="white" opacity="0.7"/>
  </g>

  <!-- "AgroScan" text -->
  <text x="100" y="140" text-anchor="middle" font-family="'Sora',Arial,sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="-0.5">AgroScan</text>

  <!-- "Pro" text in bright green -->
  <text x="100" y="160" text-anchor="middle" font-family="'Sora',Arial,sans-serif" font-weight="700" font-size="18" fill="#6EE830">Pro</text>
  <!-- Dashes -->
  <line x1="52" y1="157" x2="70" y2="157" stroke="#6EE830" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="157" x2="148" y2="157" stroke="#6EE830" stroke-width="2" stroke-linecap="round"/>
</svg>
