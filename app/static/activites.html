<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/assets/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1A8B4F">
<title>AgroScan Pro — Mes activités</title>
<meta property="og:title" content="Activités — AgroScan Pro">
<meta property="og:description" content="Calendrier cultural et gestion des tâches agricoles.">
<meta property="og:image" content="/static/assets/photos/field-rice.webp">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600" rel="stylesheet">
<link rel="stylesheet" href="/static/css/agroscan.css">
<style>
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--line);background:var(--card);color:var(--soft);transition:all .15s}
.chip.active{background:var(--g);color:#fff;border-color:var(--g)}

.act-item{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
.act-item:active{transform:scale(.98)}
.act-item.realise{opacity:.65}
.act-item.en_retard{border-left:4px solid var(--red)}
.act-item.prevu{border-left:4px solid var(--orange)}
.act-item.realise{border-left:4px solid var(--g)}
.act-ico{font-size:1.8rem;line-height:1;flex-shrink:0}
.act-body{flex:1;min-width:0}
.act-titre{font-weight:700;font-size:.95rem;line-height:1.3}
.act-meta{font-size:.78rem;color:var(--soft);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px}
.act-meta span{display:flex;align-items:center;gap:4px}
.tag{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px}
.tag.prevu{background:#fef3c7;color:#92400e}
.tag.en_retard{background:#fee2e2;color:#991b1b}
.tag.realise{background:#CBE9D8;color:#0D4D2B}

.btn-realiser{margin-top:8px;padding:8px 14px;border-radius:var(--r-sm);background:var(--g);color:#fff;font-size:.8rem;font-weight:700;font-family:var(--sans);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-realiser:active{opacity:.8}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-mini{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px;text-align:center}
.stat-mini .n{font-family:var(--title);font-weight:900;font-size:1.5rem;color:var(--gdk)}
.stat-mini .l{font-size:.7rem;color:var(--soft);margin-top:2px}
.stat-mini.warn .n{color:var(--orange)}
.stat-mini.danger .n{color:var(--red)}

.section-title{font-family:var(--title);font-weight:700;font-size:1rem;color:var(--gdeep);margin-bottom:12px}
.acts-list{display:flex;flex-direction:column;gap:10px}
.empty{text-align:center;padding:32px 20px;color:var(--soft)}
.empty .eico{font-size:2.5rem;margin-bottom:8px}
.empty p{font-size:.88rem}
.loading-state{text-align:center;padding:40px;color:var(--soft)}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--line);border-radius:10px;font-family:inherit;font-size:.88rem;background:#fff;color:var(--ink);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--g)}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.88rem;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;font-size:.88rem;z-index:200;box-shadow:0 8px 30px -8px rgba(0,0,0,.4);animation:pop .3s;max-width:90%;text-align:center}
.toast.ok{background:var(--gdeep)}.toast.err{background:#7f1d1d}
@keyframes pop{from{opacity:0;transform:translateX(-50%) scale(.9)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.tb-btn{background:rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:7px 12px;font-size:.8rem;font-weight:600;white-space:nowrap;border:none;cursor:pointer}
.tb-btn:hover{background:rgba(255,255,255,.3)}
</style>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xaeuhh2o1y");
</script>
<script src="/static/xss.js"></script>
</head>
<body>

<header class="topbar">
  <div class="tb">
    <button class="tb-back" onclick="history.back()">←</button>
    <div class="brand">
      <div class="mark"><img src="/static/assets/logo-emblem.webp" alt="AgroScan" style="width:40px;height:40px;border-radius:10px;object-fit:contain" onerror="this.outerHTML='📋'"></div>
      <div class="brand-text">
        <h1>Mes activités</h1>
        <p>Suivi cultural</p>
      </div>
    </div>
    <button class="tb-btn" onclick="exportExcel()" title="Exporter Excel">⬇ Excel</button>
    <span class="lk" onclick="logout()">Sortir</span>
  </div>
</header>

<div class="wrap">

  <div class="stats-row">
    <div class="stat-mini danger" id="sRetard"><div class="n">—</div><div class="l">en retard</div></div>
    <div class="stat-mini warn" id="sPrevu"><div class="n">—</div><div class="l">à venir</div></div>
    <div class="stat-mini" id="sRealise"><div class="n">—</div><div class="l">réalisées</div></div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="chip active" data-filtre="tous" onclick="filtrer(this)">Toutes</button>
    <button class="chip" data-filtre="en_retard" onclick="filtrer(this)">🔴 En retard</button>
    <button class="chip" data-filtre="prevu" onclick="filtrer(this)">🟡 À venir</button>
    <button class="chip" data-filtre="realise" onclick="filtrer(this)">✅ Réalisées</button>
  </div>

  <div class="search-wrap">
    <input type="search" id="actSearch" placeholder="Rechercher une activité…" oninput="onSearch(this.value)" aria-label="Rechercher une activité">
  </div>
  <p class="section-title" id="sectionTitle">Toutes les activités</p>
  <div id="actsList" class="acts-list">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>

</div>

<nav class="bottom-menu">
  <a href="/app" class="bm-item"><span class="bm-icon">🏠</span>Accueil</a>
  <a href="/mon-champ" class="bm-item"><span class="bm-icon">🌾</span>Champ</a>
  <a href="/app/activites" class="bm-item active"><span class="bm-icon">📋</span>Activités</a>
  <a href="/app/exploitation" class="bm-item"><span class="bm-icon">📊</span>Exploitation</a>
  <a href="/meteo" class="bm-item"><span class="bm-icon">🌤️</span>Météo</a>
</nav>

<script>
const TOKEN = localStorage.getItem('agro_token') || '';
if (!TOKEN) location.href = '/login';

let _allActs = [];
let _filtre = 'tous';
let _searchText = '';

function onSearch(val) {
  _searchText = val.trim().toLowerCase();
  renderList();
}

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function api(path, opts = {}) {
  opts.headers = Object.assign({'Content-Type': 'application/json'}, opts.headers || {});
  opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  const r = await fetch(path, opts);
  let data = null;
  try { data = await r.json(); } catch(e) {}
  if (!r.ok) throw { status: r.status, detail: (data && data.detail) || 'Erreur' };
  return data;
}

function logout() {
  localStorage.removeItem('agro_token');
  location.href = '/login';
}

function exportExcel() {
  fetch('/api/app/activites/export-excel', {headers: {Authorization: 'Bearer ' + TOKEN}})
    .then(r => { if (!r.ok) throw new Error(r.status); return r.blob(); })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `activites_${new Date().toISOString().slice(0,10)}.xlsx`;
      a.click();
      URL.revokeObjectURL(url);
    })
    .catch(() => toast('Erreur export Excel', 'err'));
}

function filtrer(el) {
  document.querySelectorAll('#filterBar .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  _filtre = el.dataset.filtre;
  const titres = {tous: 'Toutes les activités', en_retard: 'En retard', prevu: 'À venir', realise: 'Réalisées'};
  document.getElementById('sectionTitle').textContent = titres[_filtre] || 'Activités';
  renderList();
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'});
}

function renderList() {
  let list = _filtre === 'tous' ? _allActs : _allActs.filter(a => a.statut_simple === _filtre);
  if (_searchText) {
    list = list.filter(a =>
      (a.titre || '').toLowerCase().includes(_searchText) ||
      (a.culture || '').toLowerCase().includes(_searchText) ||
      (a.parcelle_nom || '').toLowerCase().includes(_searchText)
    );
  }
  const el = document.getElementById('actsList');

  if (!list.length) {
    const msg = _searchText ? `Aucun résultat pour « ${escapeHtml(_searchText)} »` : 'Aucune activité dans cette catégorie.';
    el.innerHTML = `<div class="empty"><div class="eico">${_searchText ? '🔍' : '🎉'}</div><p>${msg}</p></div>`;
    return;
  }

  el.innerHTML = list.map(a => {
    const tagHtml = `<span class="tag ${a.statut_simple}">${
      a.statut_simple === 'realise' ? '✅ Réalisé' :
      a.statut_simple === 'en_retard' ? '🔴 En retard' : '🟡 À venir'
    }</span>`;
    const parcHtml = a.parcelle_nom ? `<span>🌾 ${a.parcelle_nom}</span>` : '';
    const dateHtml = a.date_prevue ? `<span>📅 ${formatDate(a.date_prevue)}</span>` : '';
    const btnHtml = a.statut_simple !== 'realise'
      ? `<button class="btn-realiser" onclick="realiser(${a.id}, event)">✅ Marquer réalisé</button>` : '';

    return `<div class="act-item ${a.statut_simple}" id="act-${a.id}">
      <div class="act-ico">${a.icone}</div>
      <div class="act-body">
        <div class="act-titre">${escapeHtml(a.titre)}</div>
        <div class="act-meta">${tagHtml}${parcHtml}${dateHtml}</div>
        ${btnHtml}
      </div>
    </div>`;
  }).join('');
}

async function realiser(id, ev) {
  ev.stopPropagation();
  const btn = ev.currentTarget;
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const updated = await api(`/api/app/activites/${id}/realiser`, {method: 'POST', body: JSON.stringify({})});
    const idx = _allActs.findIndex(a => a.id === id);
    if (idx >= 0) _allActs[idx] = updated;
    renderList();
    updateStats();
    toast('Activité marquée réalisée !', 'ok');
  } catch(e) {
    toast('Erreur : ' + (e.detail || 'réessayez'), 'err');
    btn.disabled = false;
    btn.textContent = '✅ Marquer réalisé';
  }
}

function updateStats() {
  const retard = _allActs.filter(a => a.statut_simple === 'en_retard').length;
  const prevu  = _allActs.filter(a => a.statut_simple === 'prevu').length;
  const realise = _allActs.filter(a => a.statut_simple === 'realise').length;
  document.getElementById('sRetard').querySelector('.n').textContent = retard;
  document.getElementById('sPrevu').querySelector('.n').textContent = prevu;
  document.getElementById('sRealise').querySelector('.n').textContent = realise;
  const sR = document.getElementById('sRetard');
  sR.className = 'stat-mini ' + (retard > 0 ? 'danger' : '');
}

async function boot() {
  try {
    const acts = await api('/api/app/activites?limit=200');
    _allActs = acts || [];
    updateStats();
    renderList();
  } catch(e) {
    if (e.status === 401) { localStorage.removeItem('agro_token'); location.href = '/login'; }
    document.getElementById('actsList').innerHTML =
      '<div class="empty"><div class="eico">⚠️</div><p>Impossible de charger les activités.</p></div>';
  }
}

boot();
</script>
<script src="/static/network-status.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js",{scope:"/"}).catch(()=>{});</script>
</body>
</html>
