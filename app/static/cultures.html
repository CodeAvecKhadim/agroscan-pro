<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/assets/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#10b981">
<title>AgroScan Pro — Cultures</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme:{ extend:{
    colors:{ brand:{50:'#ecfdf5',100:'#CBE9D8',500:'#10b981',600:'#1A8B4F',700:'#136B3C',800:'#0D4D2B'} },
    boxShadow:{ 'card':'0 1px 2px rgba(15,23,42,.04), 0 4px 16px -8px rgba(15,23,42,.12)' },
    fontFamily:{ sans:["'Plus Jakarta Sans'",'system-ui','sans-serif'] }
  }}}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}</style>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xaeuhh2o1y");
</script>
</head>
<body class="bg-slate-50 text-slate-900">

<div class="max-w-2xl mx-auto px-4 py-6">
  <header class="mb-5">
    <h1 class="text-3xl font-black text-slate-900">Cultures</h1>
    <p class="text-slate-500">Les 29 cultures du référentiel AgroScan Pro.</p>
  </header>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="grille"></div>

  <p class="text-xs text-slate-400 mt-6 leading-relaxed">
    Les photos manquantes affichent une icône en attendant. Déposez les fichiers
    (ex. <code>riz.jpg</code>) dans le dossier <code>/static/cultures/</code> et elles apparaîtront automatiquement.
  </p>
</div>

<script>
/* Mapping culture -> fichier photo + emoji de repli.
   Les photos vont dans /static/cultures/  (ex: /static/cultures/riz.jpg).
   Tant qu'une photo n'existe pas, l'emoji s'affiche à la place. */
const CULTURES = [
  ["Riz","riz.jpg","🌾"],["Mil","mil.jpg","🌾"],["Maïs","mais.jpg","🌽"],["Sorgho","sorgho.jpg","🌾"],
  ["Arachide","arachide.jpg","🥜"],["Sésame","sesame.jpg","🌱"],["Coton","coton.jpg","🌿"],
  ["Oignon","oignon.jpg","🧅"],["Tomate","tomate.jpg","🍅"],["Carotte","carotte.jpg","🥕"],
  ["Chou","chou.jpg","🥬"],["Piment","piment.jpg","🌶️"],["Gombo","gombo.jpg","🌿"],
  ["Aubergine amère","aubergine-amere.jpg","🍆"],["Mangue","mangue.jpg","🥭"],["Pastèque","pasteque.jpg","🍉"],
  ["Melon","melon.jpg","🍈"],["Banane","banane.jpg","🍌"],["Papaye","papaye.jpg","🥭"],
  ["Bisap","bisap.jpg","🌺"],["Concombre","concombre.jpg","🥒"],["Courgette","courgette.jpg","🥒"],
  ["Laitue","laitue.jpg","🥬"],["Manioc","manioc.jpg","🥔"],["Navet chinois","navet-chinois.jpg","🥬"],
  ["Patate douce","patate-douce.jpg","🍠"],["Poivron","poivron.jpg","🫑"],["Pomme de terre","pomme-de-terre.jpg","🥔"],
  ["Jaxatu","jaxatu.jpg","🍆"]
];

const DOSSIER = "/static/cultures/";   // emplacement des photos sur le serveur
const grille = document.getElementById("grille");

CULTURES.forEach(([nom, fichier, emoji]) => {
  const carte = document.createElement("div");
  carte.className = "bg-white rounded-2xl shadow-card overflow-hidden";
  carte.innerHTML = `
    <div class="aspect-square bg-slate-100 flex items-center justify-center text-5xl relative">
      <span class="emoji">${emoji}</span>
      <img loading="lazy" alt="${nom}" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-300">
    </div>
    <div class="p-2.5 text-center text-sm font-bold text-slate-700">${nom}</div>`;
  const img = carte.querySelector("img");
  // chargement optimisé : on tente la photo ; si elle existe, elle remplace l'emoji
  img.onload = () => { img.style.opacity = "1"; };
  img.onerror = () => { img.remove(); };   // pas de photo -> on garde l'emoji
  img.src = DOSSIER + fichier;
  grille.appendChild(carte);
});
</script>
</body>
</html>
