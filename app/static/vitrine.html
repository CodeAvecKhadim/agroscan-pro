<script type="text/babel" data-presets="react">
  function Landing() {
    React.useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
      document.querySelectorAll('.reveal:not(.is-visible)').forEach((el) => io.observe(el));
      return () => io.disconnect();
    });
    return (
      <React.Fragment>
        <window.LandingNav />
        <window.LandingHero />
        <window.LandingModules />
        <window.LandingSteps />
        <window.LandingDemo />
        <window.LandingSoilSensor />
        <window.LandingWhy />
        <window.LandingStats />
        <window.LandingPricing />
        <window.LandingTestimonials />
        <window.LandingPartners />
        <window.LandingContact />
        <window.LandingFooter />
        <window.AuthLegalModals />
      </React.Fragment>
    );
  }

  function ready() {
    return window.AgroScanProDesignSystem_74357e && window.LandingNav && window.LandingHero &&
      window.LandingModules && window.LandingDemo && window.LandingSteps && window.LandingWhy &&
      window.LandingStats && window.LandingTestimonials && window.LandingPartners && window.LandingFooter &&
      window.LandingPricing && window.LandingContact && window.AuthLegalModals && window.LandingSoilSensor;
  }
  (function boot(tries) {
    if (ready()) { ReactDOM.createRoot(document.getElementById('root')).render(<Landing />); }
    else if (tries < 160) { setTimeout(() => boot(tries + 1), 40); }
    else { document.getElementById('boot').textContent = "Erreur de chargement — vérifiez la console."; }
  })(0);
</script>
