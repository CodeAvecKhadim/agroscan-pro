<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a5f">
<link rel="manifest" href="/static/manifest.json">
<title>Admin — AgroScan Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600" rel="stylesheet">
<style>
:root{
  --g:#1A8B4F;--gdk:#136B3C;--gdeep:#0D4D2B;
  --blue:#1e40af;--bluedk:#1e3a8a;--bluelg:#dbeafe;
  --paper:#f8fafc;--card:#fff;--ink:#0f172a;--soft:#475569;
  --line:#e2e8f0;--red:#dc2626;--orange:#d97706;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px -8px rgba(0,0,0,.12);
  --r:14px;--r-sm:10px;
  --sans:'Plus Jakarta Sans',sans-serif;--serif:'Sora',sans-serif;--title:'Sora',sans-serif;--mono:'IBM Plex Mono',monospace;--brand:#1A8B4F;--brand-dk:#136B3C;--brand-deep:#0D4D2B;--accent:#1B8FCC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:60px}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.topbar{background:linear-gradient(110deg,var(--bluedk),var(--blue));color:#fff;padding:0;box-shadow:0 4px 20px -8px rgba(0,20,80,.4);position:sticky;top:0;z-index:50}
.tb{max-width:1100px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px}
.tb-title{font-family:var(--title);font-weight:900;font-size:1.15rem;flex:1}
.tb-sub{font-size:.7rem;opacity:.75;display:block}
.tb-btn{background:rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:600;cursor:pointer;border:none}
.tb-btn:hover{background:rgba(255,255,255,.28)}
.tb-btn.danger{background:rgba(220,38,38,.3)}

.wrap{max-width:1100px;margin:0 auto;padding:20px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.stat-card .n{font-family:var(--title);font-weight:900;font-size:2rem;color:var(--blue);line-height:1}
.stat-card .l{font-size:.78rem;color:var(--soft);margin-top:4px;font-weight:500}
.stat-card.green .n{color:var(--gdk)}
.stat-card.orange .n{color:var(--orange)}
.stat-card.red .n{color:var(--red)}

/* SECTION */
.section{margin-bottom:28px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-head h2{font-family:var(--title);font-weight:700;font-size:1.05rem;color:var(--ink)}
.section-head .badge{background:var(--bluelg);color:var(--blue);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700}
.search-input{margin-left:auto;padding:7px 12px;border:1.5px solid var(--line);border-radius:var(--r-sm);font-size:.85rem;font-family:var(--sans);outline:none;min-width:200px}
.search-input:focus{border-color:var(--blue)}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--ink);color:#fff}
thead th{padding:10px 14px;text-align:left;font-size:.78rem;font-weight:600;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--line);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
td{padding:10px 14px;font-size:.83rem;vertical-align:middle}
td.num{font-family:var(--title);font-weight:700;font-size:.95rem;color:var(--blue)}
.plan-badge{padding:2px 9px;border-radius:10px;font-size:.72rem;font-weight:700}
.plan-badge.gratuit{background:#f1f5f9;color:#475569}
.plan-badge.premium{background:#fef9c3;color:#854d0e}
.plan-badge.cooperatif{background:#CBE9D8;color:#0D4D2B}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--line);padding-bottom:2px}
.tab{padding:8px 16px;border-radius:8px 8px 0 0;font-size:.85rem;font-weight:600;color:var(--soft);background:none;border:none;cursor:pointer;transition:all .15s}
.tab.active{background:var(--blue);color:#fff}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--soft)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px;color:var(--soft);font-size:.88rem}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:12px;font-size:.88rem;z-index:999;animation:pop .25s}
.toast.ok{background:var(--gdeep)}.toast.err{background:#7f1d1d}
@keyframes pop{from{opacity:0;transform:translateX(-50%) scale(.9)}to{opacity:1;transform:translateX(-50%) scale(1)}}

@media(max-width:640px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .search-input{min-width:120px}
  table thead th:nth-child(n+5){display:none}
  table tbody td:nth-child(n+5){display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb">
    <div style="flex:1">
      <div class="tb-title">🛡 Admin AgroScan Pro</div>
      <span class="tb-sub" id="adminEmail">Chargement…</span>
    </div>
    <button class="tb-btn" onclick="location.href='/app'">← App</button>
    <button class="tb-btn danger" onclick="logout()">Déconnexion</button>
  </div>
</div>

<div class="wrap">

  <!-- Onglets -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">Vue d'ensemble</button>
    <button class="tab" onclick="switchTab('orgs')">Organisations</button>
    <button class="tab" onclick="switchTab('users')">Utilisateurs</button>
  </div>

  <!-- VUE D'ENSEMBLE -->
  <div id="tabOverview">
    <div class="stats-grid" id="statsGrid">
      <div class="loading"><div class="spinner"></div></div>
    </div>

    <!-- Plans répartition -->
    <div class="section">
      <div class="section-head"><h2>Répartition par plan</h2></div>
      <div id="plansBar" class="table-wrap">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ORGANISATIONS -->
  <div id="tabOrgs" style="display:none">
    <div class="section">
      <div class="section-head">
        <h2>Organisations</h2>
        <span class="badge" id="orgCount">—</span>
        <input class="search-input" id="orgSearch" placeholder="🔍 Rechercher…" oninput="filterOrgs()">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Organisation</th><th>Plan</th>
              <th>Membres</th><th>Parcelles</th><th>Analyses sat.</th><th>Dernière activité</th>
            </tr>
          </thead>
          <tbody id="orgTable">
            <tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- UTILISATEURS -->
  <div id="tabUsers" style="display:none">
    <div class="section">
      <div class="section-head">
        <h2>Utilisateurs</h2>
        <span class="badge" id="userCount">—</span>
        <input class="search-input" id="userSearch" placeholder="🔍 Rechercher…" oninput="filterUsers()">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Nom</th><th>Email</th><th>Profil</th><th>Organisation</th><th>Rôle</th>
            </tr>
          </thead>
          <tbody id="userTable">
            <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
const TOKEN = localStorage.getItem('agro_token') || '';
let _orgs = [], _users = [], _stats = null;

async function api(path) {
  const r = await fetch(path, {headers: {Authorization: 'Bearer ' + TOKEN}});
  if (r.status === 401) { logout(); throw new Error('401'); }
  if (r.status === 403) { toast('Accès refusé — profil admin requis', 'err'); throw new Error('403'); }
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function logout() { localStorage.removeItem('agro_token'); location.href = '/'; }

function toast(msg, type) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['overview','orgs','users'];
    t.classList.toggle('active', names[i] === name);
  });
  document.getElementById('tabOverview').style.display = name==='overview' ? '' : 'none';
  document.getElementById('tabOrgs').style.display = name==='orgs' ? '' : 'none';
  document.getElementById('tabUsers').style.display = name==='users' ? '' : 'none';

  if (name==='orgs' && _orgs.length===0) loadOrgs();
  if (name==='users' && _users.length===0) loadUsers();
}

// ── Stats ──
async function loadStats() {
  try {
    _stats = await api('/api/admin/stats');
    const g = document.getElementById('statsGrid');
    g.innerHTML = `
      <div class="stat-card blue">
        <div class="n">${_stats.total_orgs}</div>
        <div class="l">Organisations</div>
      </div>
      <div class="stat-card green">
        <div class="n">${_stats.total_users}</div>
        <div class="l">Utilisateurs</div>
      </div>
      <div class="stat-card">
        <div class="n">${_stats.total_parcelles}</div>
        <div class="l">Parcelles</div>
      </div>
      <div class="stat-card orange">
        <div class="n">${_stats.total_analyses_satellite}</div>
        <div class="l">Analyses satellite</div>
      </div>
      <div class="stat-card green">
        <div class="n">+${_stats.nouveaux_7j}</div>
        <div class="l">Nouvelles orgs (7j)</div>
      </div>
    `;

    // Plans bar
    const plans = _stats.orgs_par_plan || {};
    const total = Object.values(plans).reduce((a, b) => a + b, 0) || 1;
    const colors = {gratuit:'#64748b', premium:'#d97706', cooperatif:'#1A8B4F'};
    const labels = {gratuit:'Gratuit', premium:'Premium', cooperatif:'Coopératif'};
    document.getElementById('plansBar').innerHTML = `
      <table><thead><tr><th>Plan</th><th>Organisations</th><th>Part</th></tr></thead>
      <tbody>${Object.entries(plans).map(([p, n]) => `
        <tr>
          <td><span class="plan-badge ${p}">${labels[p]||p}</span></td>
          <td class="num">${n}</td>
          <td><div style="background:${colors[p]||'#94a3b8'};height:8px;border-radius:4px;width:${Math.round(n/total*100)}%;min-width:4px"></div></td>
        </tr>`).join('')}
      </tbody></table>`;
  } catch(e) {
    if (e.message !== '403') document.getElementById('statsGrid').innerHTML = '<div class="empty">Erreur chargement stats</div>';
  }
}

// ── Organisations ──
async function loadOrgs() {
  try {
    _orgs = await api('/api/admin/organisations?limit=200');
    document.getElementById('orgCount').textContent = _orgs.length;
    renderOrgs(_orgs);
  } catch(e) {
    document.getElementById('orgTable').innerHTML = '<tr><td colspan="7"><div class="empty">Erreur</div></td></tr>';
  }
}

function renderOrgs(list) {
  const labels = {gratuit:'Gratuit', premium:'Premium', cooperatif:'Coopératif'};
  document.getElementById('orgTable').innerHTML = list.map(o => `
    <tr>
      <td class="num">${o.org_id}</td>
      <td style="font-weight:600">${_esc(o.org_name)}</td>
      <td><span class="plan-badge ${o.plan}">${labels[o.plan]||o.plan}</span></td>
      <td class="num">${o.nb_users}</td>
      <td class="num">${o.nb_parcelles}</td>
      <td class="num">${o.nb_analyses_satellite}</td>
      <td style="font-size:.75rem;color:var(--soft)">${o.derniere_activite ? new Date(o.derniere_activite).toLocaleDateString('fr') : '—'}</td>
    </tr>`).join('') || '<tr><td colspan="7"><div class="empty">Aucune organisation</div></td></tr>';
}

function filterOrgs() {
  const q = document.getElementById('orgSearch').value.toLowerCase();
  renderOrgs(_orgs.filter(o => o.org_name.toLowerCase().includes(q)));
}

// ── Utilisateurs ──
async function loadUsers() {
  try {
    _users = await api('/api/admin/utilisateurs?limit=500');
    document.getElementById('userCount').textContent = _users.length;
    renderUsers(_users);
  } catch(e) {
    document.getElementById('userTable').innerHTML = '<tr><td colspan="6"><div class="empty">Erreur</div></td></tr>';
  }
}

const profil_labels = {producteur:'🌾 Producteur', conseiller:'👨‍🌾 Conseiller', admin:'🛡 Admin'};

function renderUsers(list) {
  document.getElementById('userTable').innerHTML = list.map(u => `
    <tr>
      <td class="num">${u.id}</td>
      <td style="font-weight:600">${_esc(u.full_name)}</td>
      <td style="font-size:.8rem;color:var(--soft)">${_esc(u.email)}</td>
      <td>${profil_labels[u.profil]||u.profil}</td>
      <td style="font-size:.82rem">${_esc(u.org_name)}</td>
      <td style="font-size:.75rem;color:var(--soft);text-transform:capitalize">${u.role}</td>
    </tr>`).join('') || '<tr><td colspan="6"><div class="empty">Aucun utilisateur</div></td></tr>';
}

function filterUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  renderUsers(_users.filter(u =>
    u.full_name.toLowerCase().includes(q) ||
    u.email.toLowerCase().includes(q) ||
    u.org_name.toLowerCase().includes(q)
  ));
}

function _esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Boot ──
async function boot() {
  if (!TOKEN) { location.href = '/'; return; }
  try {
    const me = await api('/api/auth/me');
    document.getElementById('adminEmail').textContent = me.email + ' · ' + me.profil;
    if (me.profil !== 'admin') {
      document.body.innerHTML = '<div style="text-align:center;padding:60px;font-family:sans-serif"><h2>Accès réservé aux administrateurs</h2><a href="/app">Retour</a></div>';
      return;
    }
  } catch(e) { return; }
  loadStats();
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
boot();
</script>
</body>
</html>
